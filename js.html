// ==============================================================
// --- AI Core Timeout & Retry Management (v1.5.1) ---
// แก้อาการ Infinite Loading (หมุนค้าง) จากปัญหา GAS Cold Start
// ==============================================================
const runGas = (funcName, ...args) => {
    const MAX_RETRIES = 2; // จำนวนครั้งที่จะลองใหม่เมื่อเกิด Timeout หรือ Error
    const TIMEOUT_MS = 45000; // ตัดจบที่ 45 วินาที (ป้องกันการค้างตลอดกาล)

    const execute = (retryCount) => {
        return new Promise((resolve, reject) => {
            if (typeof google === 'undefined') { 
                reject(new Error("ไม่พบ Google API")); 
                return; 
            }

            let isResolved = false;

            // ตั้งเวลา Timeout สำหรับรอบนี้
            const timeoutId = setTimeout(() => {
                if (!isResolved) {
                    isResolved = true;
                    reject(new Error(`Timeout: การตอบสนองจากเซิร์ฟเวอร์ช้าเกินไป (Cold Start) [${funcName}]`));
                }
            }, TIMEOUT_MS);

            google.script.run
                .withSuccessHandler(res => {
                    if (!isResolved) {
                        isResolved = true;
                        clearTimeout(timeoutId);
                        res ? resolve(res) : reject(new Error("No response"));
                    }
                })
                .withFailureHandler(err => {
                    if (!isResolved) {
                        isResolved = true;
                        clearTimeout(timeoutId);
                        reject(err);
                    }
                })
                [funcName](...args);

        }).catch(err => {
            // ถ้ารอบนี้พัง หรือ Timeout ให้ลองใหม่จนกว่าจะครบ MAX_RETRIES
            if (retryCount < MAX_RETRIES) {
                console.warn(`[CytoFlow Auto-Retry ${retryCount + 1}/${MAX_RETRIES}] ฟังก์ชัน ${funcName} ล้มเหลว: ${err.message}. กำลังลองใหม่ใน 1.5 วินาที...`);
                return new Promise(res => setTimeout(res, 1500)).then(() => execute(retryCount + 1));
            }
            throw err; // ถ้าครบโควต้าแล้วยังพัง ให้โยน Error ออกไปให้ระบบ UI จัดการ
        });
    };

    return execute(0);
};

            activeStickerElement.value = elementKey;
            
            const startX = event.clientX;
            const startY = event.clientY;
            
            const initialObjX = stickerConfig.layout[elementKey].x;
            const initialObjY = stickerConfig.layout[elementKey].y;
            
            const currentZoom = stickerZoom.value || 1;

            const onMouseMove = (e) => {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                const dxMm = pxToMm(dx) / currentZoom;
                const dyMm = pxToMm(dy) / currentZoom;

                stickerConfig.layout[elementKey].x = Math.round((initialObjX + dxMm) * 10) / 10;
                stickerConfig.layout[elementKey].y = Math.round((initialObjY + dyMm) * 10) / 10;
            };

            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        };

        const startRotate = (elementKey, event) => {
            event.stopPropagation(); 
            activeStickerElement.value = elementKey;
            
            const targetEl = event.target.closest('.sticker-element');
            if (!targetEl) return;

            const rect = targetEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const onMouseMove = (e) => {
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                
                const radians = Math.atan2(mouseY - centerY, mouseX - centerX);
                let degrees = (radians * (180 / Math.PI)) + 90; 
                
                if (degrees < 0) degrees += 360;
                
                const snap = 15;
                degrees = Math.round(degrees / snap) * snap;
                if (degrees === 360) degrees = 0;

                stickerConfig.layout[elementKey].rot = degrees;
            };

            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };

            document.addEventListener('mousemove', onMouseMove);

                    htmlContent += `<div class="el" style="left:${l.age.x}mm; top:${l.age.y}mm; font-size:${l.age.size}pt; font-weight:${l.age.bold?'bold':'normal'}; font-family:${getFontStr(l.age.font)}; transform: translate(-50%, -50%) rotate(${l.age.rot}deg);">${patient.age} ปี</div>`;

                    htmlContent += `<div class="el" style="left:${l.spec.x}mm; top:${l.spec.y}mm; font-size:${l.spec.size}pt; font-weight:${l.spec.bold?'bold':'normal'}; font-family:${getFontStr(l.spec.font)}; transform: translate(-50%, -50%) rotate(${l.spec.rot}deg);">${specStr}</div>`;

        const getTAT = (p) => {
            if (!p.recDate) return { days: 0, percent: 0, colorClass: 'bg-slate-300', statusText: 'รอข้อมูล' };
            const start = new Date(p.recDate);
            let end = new Date(); 
            
            if (p.status === 'Reported') {
                const reportDTStr = p.pathoDateTime ? p.pathoDateTime : p.cytoDateTime;
                const parsed = parseDateTimeString(reportDTStr);
                if(parsed.date) end = new Date(parsed.date);
            }
            
            start.setHours(0,0,0,0); 
            end.setHours(0,0,0,0);
            
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let percent = (diffDays / 14) * 100;
            if (percent > 100) percent = 100;
            
            let colorClass = 'bg-gradient-to-r from-emerald-400 via-emerald-200 to-emerald-400'; 
            if (diffDays >= 8 && diffDays <= 12) colorClass = 'bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-400'; 
            if (diffDays >= 13) colorClass = 'bg-gradient-to-r from-rose-500 via-red-300 to-rose-500'; 
            
            const dayText = diffDays <= 1 ? 'Day' : 'Days';
            
            return {
                days: diffDays,
                percent: percent,
                colorClass: colorClass,
                statusText: `${diffDays} ${dayText}`
            };
        };

        const parseDateTimeString = (dtStr) => {
            if (!dtStr) return { date: '', time: '' };
            try {
                if (dtStr.includes('GMT') || dtStr.includes('Z')) {
                    const d = new Date(dtStr);
                    if (!isNaN(d)) {
                        const pad = (n) => String(n).padStart(2, '0');
                        return { date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`, time: `${pad(d.getHours())}:${pad(d.getMinutes())}` };
                    }
                }
                const parts = dtStr.split(', ');
                if (parts.length !== 2) return { date: '', time: '' };
                const [dPart, tPart] = parts;
                const dateParts = dPart.split('/');
                if (dateParts.length !== 3) return { date: '', time: '' };
                const [day, month, year] = dateParts;
                const dateStr = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                const timeStr = tPart.substring(0, 5);
                return { date: dateStr, time: timeStr };
            } catch(e) { return { date: '', time: '' }; }
        };
