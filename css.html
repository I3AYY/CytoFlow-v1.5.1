<style>

  /* --- SWEETALERT THEME SUPPORT (เพื่อให้ Modal เข้ากับ Theme) --- */

  .swal2-popup { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: var(--glass-blur) !important; color: var(--text-main) !important; }

  /* Custom Checkbox (ช่องกาถูกด้านหน้า) */
  .report-checkbox {

      height: 24px;

  }

  /* Chevron / Arrow Dropdown (ลูกศรด้านหลัง) */
  .report-chevron {

  }

  /* Content Body */
  .report-accordion-content {
      max-height: 0;
      overflow: hidden;

      padding: 0 1.25rem;

  }
  
  .report-accordion-item.is-expanded > .report-accordion-content {

  .sub-accordion-item {

  /* --- Animations & Effects --- */
  @keyframes stampEffect {
      0% { opacity: 0; transform: scale(1.5) rotate(-45deg); }
      60% { opacity: 1; transform: scale(0.9) rotate(-45deg); }
      100% { opacity: 1; transform: scale(1) rotate(-45deg); }
  }
  .animate-stamp {

  }

  /* [UX/UI Update] เพิ่ม Animation สำหรับ Loading Spinners เพื่อให้ดูเป็นมืออาชีพและลดความสับสนของผู้ใช้ */
  @keyframes spin {

  }

  }

  th.sticky {

  }

  .mpi-latest-col-header {

  /* --- MPI Table Fixed Layout --- */

  /* Transitions & Animations */
  .fade-enter-active, .fade-leave-active { transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .fade-enter-from, .fade-leave-to { opacity: 0; }

  .screen-lock-enter-from, .screen-lock-leave-to { opacity: 0; backdrop-filter: blur(0px); transform: scale(1.05); }

  [v-cloak] { display: none; }
  html { scroll-behavior: smooth; }
  
  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-input); border-radius: 10px; }

  .custom-scroll::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
  .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .animate-energy-bar { background-size: 200% 200%; animation: energyFlow 3.2s linear infinite; }
  @keyframes energyFlow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .bg-deep-space { background-color: #0f172a; } 
  @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(40px, -60px) scale(1.1); } 66% { transform: translate(-30px, 30px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
  .animate-blob { animation: blob 8s infinite alternate ease-in-out; }
  .animation-delay-2000 { animation-delay: 2s; } .animation-delay-4000 { animation-delay: 4s; }

  @keyframes pastel-breathing { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .animated-pastel-text { background: linear-gradient(270deg, #f472b6, #c084fc, #38bdf8, #818cf8); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pastel-breathing 4s ease infinite; padding-bottom: 0.15em; margin-bottom: -0.15em; }
  .gimmick-hover { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: inline-block; }
  .gimmick-hover:hover { background: linear-gradient(270deg, #f472b6, #c084fc, #38bdf8, #818cf8); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pastel-breathing 4s ease infinite; transform: scale(1.15) translateY(-2px); font-weight: 900; }

  .smart-blur-wrapper { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
  .smart-blur-content { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .smart-blur-wrapper.is-blurred .smart-blur-content { filter: blur(5px); opacity: 0.4; pointer-events: none; user-select: none; }
  .smart-blur-wrapper.is-blurred:hover .smart-blur-content { filter: blur(0px); opacity: 1; pointer-events: auto; }

  /* ==============================================================

  /* ==============================================================
     --- STICKER WYSIWYG DESIGNER CSS --- 
     ============================================================== */
  .sticker-designer-modal {

  .canvas-zoom-wrapper {

      overflow: auto;

  .zoom-btn {

      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border-input);
      border-radius: 6px;

      cursor: pointer;
      transition: all 0.2s;
  }
  .zoom-btn:hover { background: var(--row-hover); color: var(--text-main); }

  .sticker-canvas-bg {
      background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
      background-size: 5mm 5mm;
      background-color: #ffffff; /* พื้นหลังของกระดาษสติ๊กเกอร์ ยังคงต้องเป็นสีขาวเสมอ */
      border: 1px solid #cbd5e1;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
      margin: 0 auto;
      transform-origin: center center;
      transition: transform 0.2s ease-out;
  }
  
  .sticker-element {
      position: absolute;
      cursor: move;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
      font-family: sans-serif;
      transform-origin: center center;
      border: 1px dashed transparent;
      transition: border-color 0.1s, background-color 0.1s;
      padding: 2px;
      color: black; /* ข้อความบนสติ๊กเกอร์ต้องเป็นสีดำเสมอ */
  }

  .sticker-element:active { cursor: grabbing; }
  .sticker-element:hover { border-color: #94a3b8; }
  .sticker-element.active {
      border-color: #3b82f6;
      background-color: rgba(59, 130, 246, 0.05);
      z-index: 20;
  }
  
  .sticker-element.active::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 20px;
      background: #3b82f6;
  }
  .sticker-element.active .rotator-handle {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      background-color: #ffffff;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%233b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M21 13a9 9 0 1 1-3-7.7L21 8"></path></svg>');
      background-repeat: no-repeat;
      background-position: center;
      border: 2px solid #3b82f6;
      border-radius: 50%;
      cursor: grab;
      z-index: 25;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: all 0.2s ease;
  }
  .sticker-element.active .rotator-handle:hover {
      transform: translateX(-50%) scale(1.1);
      background-color: #eff6ff;
  }
  .sticker-element.active .rotator-handle:active {
      cursor: grabbing;
      transform: translateX(-50%) scale(0.95);
  }

  .sticker-element img, 
  .sticker-element canvas, 
  .sticker-element svg {
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
  }
